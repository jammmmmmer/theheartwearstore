[build]
  command = "next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  directory = "netlify/functions"
  timeout = 26

[[headers]]
  for = "/api/webhooks/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/auto-product/*"
  [headers.values]
    Cache-Control = "no-store"
